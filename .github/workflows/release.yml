name: Release

on:
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.9"

jobs:
  # ── GitHub Release note ─────────────────────────────────────────────────────
  # Creates a GitHub Release on every version tag.
  # The production app is deployed automatically by Vercel on push to main —
  # no build artifact needed here. Release note links to the live Vercel URL.
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Vierify ${{ github.ref_name }}

            Production deploy: https://vierify.vercel.app

            > Web-only release — responsive PWA for desktop and mobile browsers.
            > No app store download required; use "Add to Home Screen" on iOS/Android.
